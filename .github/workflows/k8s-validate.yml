name: Validate Kubernetes manifests

on:
  pull_request:
    paths:
      - "deployment/**"
      - ".github/workflows/k8s-validate.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read

    env:
      K8S_VERSION: "1.28.0"
      KUBECONFORM_VERSION: "0.7.0"
      KUBE_SCORE_VERSION: "1.20.0"
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform (schema validation)
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$url" | tar -xz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Install kube-score (best-practice checks)
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/zegl/kube-score/releases/download/v${KUBE_SCORE_VERSION}/kube-score_${KUBE_SCORE_VERSION}_linux_amd64.tar.gz"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$url" | tar -xz
          sudo mv kube-score /usr/local/bin/kube-score
          kube-score version

      - name: Check for manifests
        id: files
        shell: bash
        run: |
          set -euo pipefail

          out="${RUNNER_TEMP}/k8s-manifests.txt"
          : > "$out"

          if [ -d deployment ]; then
            while IFS= read -r -d '' f; do
              if grep -qE '^[[:space:]]*apiVersion:' "$f" && grep -qE '^[[:space:]]*kind:' "$f"; then
                printf '%s\n' "$f" >> "$out"
              fi
            done < <(find deployment -type f \( -name '*.yml' -o -name '*.yaml' \) -print0)
          fi

          if [ -s "$out" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
          echo "list=$out" >> "$GITHUB_OUTPUT"

      - name: Schema validate (FAIL on errors)
        if: steps.files.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < "${{ steps.files.outputs.list }}"

          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -kubernetes-version "${K8S_VERSION}" \
            -schema-location default \
            -schema-location "https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/{{.NormalizedKubernetesVersion}}-standalone-strict/{{.ResourceKind}}.json" \
            "${files[@]}"

      - name: kube-score (WARN only; fail on tool errors)
        if: steps.files.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < "${{ steps.files.outputs.list }}"

          set +e
          kube-score score --output-format ci "${files[@]}"
          rc=$?
          set -e

          if [ "$rc" -eq 0 ]; then
            exit 0
          elif [ "$rc" -eq 1 ]; then
            echo "kube-score reported findings (rc=$rc) – non-fatal"
            exit 0
          else
            echo "kube-score failed to run correctly (rc=$rc)"
            exit "$rc"
          fi