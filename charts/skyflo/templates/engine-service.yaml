apiVersion: v1
kind: Service
metadata:
  name: {{ include "skyflo.engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skyflo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "skyflo.engine.fullname" . }}
