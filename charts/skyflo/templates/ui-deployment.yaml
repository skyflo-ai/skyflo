apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skyflo.ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skyflo.labels" . | nindent 4 }}
    app: {{ include "skyflo.ui.fullname" . }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: {{ include "skyflo.ui.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "skyflo.ui.fullname" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag | default (include "skyflo.defaultTag" .) }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "skyflo.ui.configMapName" . }}
          env:
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1002
            runAsGroup: 1002
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        - name: proxy
          image: "{{ .Values.ui.proxy.image.repository }}:{{ .Values.ui.proxy.image.tag | default (include "skyflo.defaultTag" .) }}"
          imagePullPolicy: {{ .Values.ui.proxy.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http-proxy
          env:
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: ENGINE_UPSTREAM
              value: "{{ include "skyflo.engine.fullname" . }}:8080"
            - name: UI_UPSTREAM
              value: "{{ include "skyflo.ui.fullname" . }}:3000"
          resources:
            {{- toYaml .Values.ui.proxy.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /health
              port: http-proxy
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http-proxy
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      {{- with .Values.ui.nodeSelector | default .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity | default .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations | default .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
