apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "skyflo.engine.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skyflo.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.engine.config.appName | quote }}
  APP_DESCRIPTION: {{ .Values.engine.config.appDescription | quote }}
  DEBUG: {{ .Values.engine.config.debug | quote }}
  API_V1_STR: {{ .Values.engine.config.apiV1Str | quote }}
  LOG_LEVEL: {{ .Values.engine.config.logLevel | quote }}
  RATE_LIMITING_ENABLED: {{ .Values.engine.config.rateLimitingEnabled | quote }}
  RATE_LIMIT_PER_MINUTE: {{ .Values.engine.config.rateLimitPerMinute | quote }}
  JWT_ALGORITHM: {{ .Values.engine.config.jwtAlgorithm | quote }}
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: {{ .Values.engine.config.jwtAccessTokenExpireMinutes | quote }}
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: {{ .Values.engine.config.jwtRefreshTokenExpireDays | quote }}
  LLM_MAX_ITERATIONS: {{ .Values.engine.config.llmMaxIterations | quote }}
