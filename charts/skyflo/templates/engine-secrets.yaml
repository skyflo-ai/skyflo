{{- if not .Values.engine.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "skyflo.engine.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skyflo.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_MODEL: {{ .Values.engine.secrets.llmModel | quote }}
  LLM_HOST: {{ .Values.engine.secrets.llmHost | quote }}
  JWT_SECRET: {{ include "skyflo.jwtSecret" . | quote }}
  {{- if not .Values.postgresql.enabled }}
  {{- with .Values.engine.secrets.llmReasoningEffort }}
  LLM_REASONING_EFFORT: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.llmThinkingBudgetTokens }}
  LLM_THINKING_BUDGET_TOKENS: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.llmMaxTokens }}
  LLM_MAX_TOKENS: {{ . | quote }}
  {{- end }}
  POSTGRES_DATABASE_URL: {{ include "skyflo.postgres.url" . | quote }}
  {{- end }}
  REDIS_URL: {{ include "skyflo.redis.url" . | quote }}
  OPENAI_API_KEY: {{ .Values.engine.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.engine.secrets.anthropicApiKey | quote }}
  AZURE_API_KEY: {{ .Values.engine.secrets.azureApiKey | quote }}
  GEMINI_API_KEY: {{ .Values.engine.secrets.geminiApiKey | quote }}
  COHERE_API_KEY: {{ .Values.engine.secrets.cohereApiKey | quote }}
  MISTRAL_API_KEY: {{ .Values.engine.secrets.mistralApiKey | quote }}
  GROQ_API_KEY: {{ .Values.engine.secrets.groqApiKey | quote }}
  ANYSCALE_API_KEY: {{ .Values.engine.secrets.anyscaleApiKey | quote }}
  OPENROUTER_API_KEY: {{ .Values.engine.secrets.openrouterApiKey | quote }}
  PERPLEXITYAI_API_KEY: {{ .Values.engine.secrets.perplexityaiApiKey | quote }}
  FIREWORKS_AI_API_KEY: {{ .Values.engine.secrets.fireworksAiApiKey | quote }}
  TOGETHERAI_API_KEY: {{ .Values.engine.secrets.togetheraiApiKey | quote }}
  DEEPINFRA_API_KEY: {{ .Values.engine.secrets.deepinfraApiKey | quote }}
  AI21_API_KEY: {{ .Values.engine.secrets.ai21ApiKey | quote }}
  NLP_CLOUD_API_KEY: {{ .Values.engine.secrets.nlpCloudApiKey | quote }}
  REPLICATE_API_KEY: {{ .Values.engine.secrets.replicateApiKey | quote }}
  HF_TOKEN: {{ .Values.engine.secrets.hfToken | quote }}
  DATABRICKS_TOKEN: {{ .Values.engine.secrets.databricksToken | quote }}
  CLARIFAI_PAT: {{ .Values.engine.secrets.clarifaiPat | quote }}
  VOYAGE_API_KEY: {{ .Values.engine.secrets.voyageApiKey | quote }}
  JINAAI_API_KEY: {{ .Values.engine.secrets.jinaaiApiKey | quote }}
  ALEPHALPHA_API_KEY: {{ .Values.engine.secrets.alephalphaApiKey | quote }}
  BASETEN_API_KEY: {{ .Values.engine.secrets.basetenApiKey | quote }}
  SAMBANOVA_API_KEY: {{ .Values.engine.secrets.sambanovaApiKey | quote }}
  FEATHERLESS_AI_API_KEY: {{ .Values.engine.secrets.featherlessAiApiKey | quote }}
  OLLAMA_API_KEY: {{ .Values.engine.secrets.ollamaApiKey | quote }}
  IBM_API_KEY: {{ .Values.engine.secrets.ibmApiKey | quote }}
  PREDIBASE_API_KEY: {{ .Values.engine.secrets.predibaseApiKey | quote }}
  NVIDIA_NGC_API_KEY: {{ .Values.engine.secrets.nvidiaNgcApiKey | quote }}
  XAI_API_KEY: {{ .Values.engine.secrets.xaiApiKey | quote }}
  VOLCENGINE_API_KEY: {{ .Values.engine.secrets.volcengineApiKey | quote }}
  MOONSHOT_API_KEY: {{ .Values.engine.secrets.moonshotApiKey | quote }}
  DEEPSEEK_API_KEY: {{ .Values.engine.secrets.deepseekApiKey | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.engine.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.engine.secrets.awsSecretAccessKey | quote }}
  AWS_REGION_NAME: {{ .Values.engine.secrets.awsRegionName | quote }}
{{- end }}
