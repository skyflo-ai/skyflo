apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "skyflo.mcp.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skyflo.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.mcp.config.appName | quote }}
  APP_DESCRIPTION: {{ .Values.mcp.config.appDescription | quote }}
  DEBUG: {{ .Values.mcp.config.debug | quote }}
  LOG_LEVEL: {{ .Values.mcp.config.logLevel | quote }}
  MAX_RETRY_ATTEMPTS: {{ .Values.mcp.config.maxRetryAttempts | quote }}
  RETRY_BASE_DELAY: {{ .Values.mcp.config.retryBaseDelay | quote }}
  RETRY_MAX_DELAY: {{ .Values.mcp.config.retryMaxDelay | quote }}
  RETRY_EXPONENTIAL_BASE: {{ .Values.mcp.config.retryExponentialBase | quote }}
